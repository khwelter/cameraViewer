video:
  source: '0'
  width: 1280
  height: 720
  fps: 30.0
  jpeg_quality: 85
pipeline:
  steps:
  - id: step-gaussian
    enabled: false
    operation: gaussian_blur
    params:
      ksize: 5
      sigma_x: 1.2
      sigma_y: 1.2
  - id: step-1-flip
    enabled: true
    operation: flip
    params:
      mode: horizontal
  - id: step-canny
    enabled: true
    operation: flip
    params:
      mode: horizontal

